# Configuraçăo básica da aplicaçăo
spring.application.name=jogos

# Configuraçăo do banco de dados Aiven MySQL
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# Configuraçőes do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL5Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


logging.level.org.springframework.security=TRACE
# ou DEBUG se TRACE for muito verboso inicialmente
# logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=TRACE

# JWT Secret Key - MUDE PARA UM VALOR SEGURO E LONGO EM PRODUÇĂO!
api.security.token.secret=senha2559
